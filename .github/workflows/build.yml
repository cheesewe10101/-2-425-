name: Build OpenBSD Very Cool System

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: List all files (debug)
      run: |
        echo "=== Current directory ==="
        Get-Location
        echo "=== All files in repository ==="
        Get-ChildItem -Recurse | Select-Object FullName, Length
        echo "=== Checking required files ==="
        if (Test-Path "рыбка.jpeg") { Write-Host "✅ рыбка.jpeg found" } else { Write-Host "❌ рыбка.jpeg missing" }
        if (Test-Path "nya.ico") { Write-Host "✅ nya.ico found" } else { Write-Host "❌ nya.ico missing" }
        if (Test-Path "ljnn.mp3") { Write-Host "✅ ljnn.mp3 found" } else { Write-Host "⚠️ ljnn.mp3 missing" }
        if (Test-Path "larp.py") { Write-Host "✅ larp.py found" } else { Write-Host "❌ larp.py missing" }
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow
    
    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --name "openbsdverycoolsystem" --add-data "рыбка.jpeg;." --add-data "nya.ico;." --add-data "ljnn.mp3;." larp.py
    
    - name: Verify build
      run: |
        if (Test-Path "dist\openbsdverycoolsystem.exe") {
          $size = (Get-Item "dist\openbsdverycoolsystem.exe").Length
          Write-Host "✅ Build successful! Size: $([math]::Round($size/1MB, 2)) MB"
        } else {
          Write-Host "❌ Build failed - executable not found"
          exit 1
        }
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openbsdverycoolsystem
        path: dist/*.exe
        retention-days: 14
